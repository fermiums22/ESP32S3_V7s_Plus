name: "GoPro Assist Bridge"
description: "Voice gateway from the robot GoPro microphone to Home Assistant Assist"
version: "0.1.3"
slug: "gopro_assist_bridge"
init: false
startup: application
boot: auto
arch:
  - amd64
homeassistant_api: true
host_network: true
options:
  rtsp_url: "rtsp://192.168.0.4:8554/gopro_robot"
  pipeline_id: "01kxvnjgzn01ztjz62rvdyydf8"
  pipeline_name: "GPT"
  stt_engine: "stt.faster_whisper"
  stt_language: "ru"
  wake_phrases: "робот,фермиум"
  tts_entity: "tts.piper"
  media_player: "media_player.v7s_plus_wifi_audio"
  language: "ru_RU"
  vad_start_rms: 700
  vad_end_rms: 400
  vad_noise_multiplier: 3.0
  vad_silence_ms: 700
  vad_pre_roll_ms: 400
  vad_min_speech_ms: 300
  vad_max_segment_ms: 12000
  debug: false
schema:
  rtsp_url: str
  pipeline_id: str
  pipeline_name: str
  stt_engine: str
  stt_language: str
  wake_phrases: str
  tts_entity: str
  media_player: str
  language: str
  vad_start_rms: int
  vad_end_rms: int
  vad_noise_multiplier: float
  vad_silence_ms: int
  vad_pre_roll_ms: int
  vad_min_speech_ms: int
  vad_max_segment_ms: int
  debug: bool

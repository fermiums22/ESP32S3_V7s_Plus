name: "GoPro Assist Bridge"
description: "Voice gateway from the robot GoPro microphone to Home Assistant Assist"
version: "0.9.0"
slug: "gopro_assist_bridge"
init: false
startup: application
boot: auto
arch:
  - amd64
homeassistant_api: true
host_network: true
options:
  rtsp_url: "rtsp://192.168.0.4:8554/gopro_robot"
  pipeline_id: "01kxvnjgzn01ztjz62rvdyydf8"
  pipeline_name: "GPT"
  stt_engine: "stt.whisper_cpp"
  stt_language: "ru"
  wake_phrases: "сокол девять,сокол"
  tts_entity: "tts.piper"
  media_player: "media_player.v7s_plus_wifi_audio"
  language: "ru_RU"
  agent_enabled: true
  openai_api_key: ""
  cloud_stt_enabled: true
  cloud_stt_model: "gpt-4o-mini-transcribe"
  cloud_stt_prompt: "Русская речь. Калибровка, порог речи, Сокол, Виктор."
  cloud_stt_daily_audio_seconds_limit: 600
  cloud_stt_timeout_seconds: 60
  cloud_stt_input_usd_per_million: 1.25
  cloud_stt_output_usd_per_million: 5.0
  conversation_timeout_seconds: 45
  agent_model: "gpt-5.6-sol"
  agent_system_prompt: "@builtin"
  agent_max_output_tokens: 2048
  agent_history_turns: 20
  agent_max_tool_rounds: 4
  agent_reasoning_effort: "none"
  agent_daily_limit_usd: 1.10
  agent_monthly_limit_usd: 34.0
  agent_request_reserve_usd: 0.05
  agent_input_usd_per_million: 5.0
  agent_cached_input_usd_per_million: 0.5
  agent_output_usd_per_million: 30.0
  vision_model: "gpt-5.6-luna"
  vision_max_output_tokens: 300
  vision_input_usd_per_million: 1.0
  vision_cached_input_usd_per_million: 0.1
  vision_output_usd_per_million: 6.0
  camera_entity: "camera.robot_eyes"
  home_map_entity: ""
  camera_telemetry_entities: "sensor.v7s_plus_robot_state,sensor.v7s_plus_front_distance_left,sensor.v7s_plus_front_distance_center,sensor.v7s_plus_front_distance_right,sensor.v7s_plus_proximity_motion,sensor.v7s_plus_stm32_battery_voltage,sensor.v7s_plus_stm32_battery_current,binary_sensor.v7s_plus_left_motor_fault,binary_sensor.v7s_plus_right_motor_fault,binary_sensor.v7s_plus_robot_docked"
  robot_event_entities: "sensor.v7s_plus_robot_state,sensor.v7s_plus_proximity_event,binary_sensor.v7s_plus_left_bumper_pressed,binary_sensor.v7s_plus_right_bumper_pressed,binary_sensor.v7s_plus_left_bumper_latched,binary_sensor.v7s_plus_right_bumper_latched,binary_sensor.v7s_plus_stm32_emergency_stop,binary_sensor.v7s_plus_left_motor_fault,binary_sensor.v7s_plus_right_motor_fault,binary_sensor.v7s_plus_robot_docked"
  follow_distance_entities: "sensor.v7s_plus_front_distance_left,sensor.v7s_plus_front_distance_center,sensor.v7s_plus_front_distance_right"
  follow_left_wheel_entity: "number.v7s_plus_left_wheel_target"
  follow_right_wheel_entity: "number.v7s_plus_right_wheel_target"
  follow_run_entity: "switch.v7s_plus_robot_run"
  follow_safety_entities: "binary_sensor.v7s_plus_bumper_hit,binary_sensor.v7s_plus_left_motor_fault,binary_sensor.v7s_plus_right_motor_fault,binary_sensor.v7s_plus_stm32_emergency_stop,binary_sensor.v7s_plus_robot_docked"
  place_odometry_entities: "sensor.v7s_plus_left_wheel_position,sensor.v7s_plus_right_wheel_position,sensor.v7s_plus_caster_odometry"
  dialog_history_turns: 20
  dialog_message_max_chars: 6000
  vad_start_rms: 120
  vad_end_rms: 80
  vad_noise_multiplier: 1.35
  vad_start_rms_max: 480
  vad_silence_ms: 650
  vad_pre_roll_ms: 450
  vad_min_speech_ms: 360
  vad_max_segment_ms: 25000
  debug: false

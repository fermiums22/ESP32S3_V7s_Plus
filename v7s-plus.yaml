esphome:
  name: v7s-plus
  friendly_name: V7s Plus
  min_version: 2026.6.5
  on_boot:
    priority: -100
    then:
      - binary_sensor.template.publish:
          id: audio_bridge_online
          state: false
      - delay: 3s
      - switch.turn_off: audio_bridge_ota_command

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  partitions:
    - name: audio
      type: data
      subtype: spiffs
      size: 0x600000
  toolchain: esp-idf
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LWIP_TCP_WND_DEFAULT: "65535"
      CONFIG_LWIP_TCP_RECVMBOX_SIZE: "32"

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG
  logs:
    modbus: ERROR
    modbus_controller: ERROR
    modbus_controller.sensor: ERROR
    modbus_controller.binary_sensor: ERROR
    modbus_controller.number: ERROR
    modbus_controller.switch: ERROR

debug:
  update_interval: 30s

uart:
  - id: stm32_uart
    tx_pin: GPIO42
    rx_pin: GPIO41
    baud_rate: 921600
    data_bits: 8
    parity: NONE
    stop_bits: 1
    rx_buffer_size: 512
  - id: bridge_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
    data_bits: 8
    parity: NONE
    stop_bits: 1
    rx_buffer_size: 256

modbus:
  - id: stm32_modbus
    uart_id: stm32_uart
    role: client
    send_wait_time: 2ms
    turnaround_time: 2ms
  - id: bridge_modbus
    uart_id: bridge_uart
    role: client
    send_wait_time: 50ms
    turnaround_time: 5ms

modbus_controller:
  - id: stm32_controller
    address: 1
    modbus_id: stm32_modbus
    command_throttle: 2ms
    update_interval: 500ms
    max_cmd_retries: 0
    offline_skip_updates: 5
    on_online:
      - binary_sensor.template.publish:
          id: stm32_online
          state: true
    on_offline:
      - binary_sensor.template.publish:
          id: stm32_online
          state: false
  - id: bridge_controller
    address: 2
    modbus_id: bridge_modbus
    command_throttle: 5ms
    update_interval: 1s
    max_cmd_retries: 1
    offline_skip_updates: 0
    on_command_sent:
      - if:
          condition:
            lambda: |-
              return function_code == 6 && address == 1 &&
                     id(audio_bridge_ota_request_pending);
          then:
            - globals.set:
                id: audio_bridge_ota_request_sent
                value: "true"
    on_online:
      - binary_sensor.template.publish:
          id: audio_bridge_online
          state: true
    on_offline:
      - binary_sensor.template.publish:
          id: audio_bridge_online
          state: false

v7s_stm32_flasher:
  id: stm32_flasher
  uart_id: stm32_uart
  modbus_controller_id: stm32_controller
  boot_pin: GPIO1
  reset_pin:
    number: GPIO2
    mode:
      output: true
      open_drain: true
  upload_token: !secret stm32_upload_token
  flash_button:
    name: Flash staged STM32 firmware
  progress:
    name: STM32 flash progress
  status:
    name: STM32 flash status
  upload_status:
    name: STM32 staging status
  upload_size:
    name: STM32 staging size

web_server:
  port: 80
  version: 3
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
  # Enables ESP-IDF multipart POST handling used by the STM32 image endpoint.
  # This also keeps the authenticated web OTA page available as a recovery path.
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

pcm_i2s_tx:

speaker:
  - platform: pcm_i2s_tx
    id: pcm_bridge

media_player:
  - platform: speaker
    id: wifi_audio_player
    name: WiFi audio
    buffer_size: 1000000
    announcement_pipeline:
      speaker: pcm_bridge
      format: MP3
      sample_rate: 44100
      num_channels: 2

globals:
  - id: local_audio_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: audio_bridge_ota_request_pending
    type: bool
    restore_value: no
    initial_value: "false"
  - id: audio_bridge_ota_request_sent
    type: bool
    restore_value: no
    initial_value: "false"

script:
  - id: open_audio_bridge_ota_window
    mode: restart
    then:
      - component.resume: bridge_controller
      - globals.set:
          id: audio_bridge_ota_request_sent
          value: "false"
      - globals.set:
          id: audio_bridge_ota_request_pending
          value: "true"
      - switch.turn_on: audio_bridge_ota_command
      - wait_until:
          condition:
            lambda: return id(audio_bridge_ota_request_sent);
          timeout: 3s
      - if:
          condition:
            lambda: return id(audio_bridge_ota_request_sent);
          then:
            - globals.set:
                id: audio_bridge_ota_request_pending
                value: "false"
            - delay: 100ms
            - component.suspend: bridge_controller
            - logger.log: "Audio bridge OTA requested; Modbus polling paused"
            - delay: 15min
            - component.resume: bridge_controller
            - switch.turn_off: audio_bridge_ota_command
            - logger.log: "Audio bridge OTA window closed; Modbus polling resumed"
          else:
            - globals.set:
                id: audio_bridge_ota_request_pending
                value: "false"
            - logger.log:
                level: WARN
                format: "Audio bridge did not acknowledge OTA request; Modbus polling stays active"

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              return id(local_audio_active) &&
                     api::global_api_server->is_connected_with_state_subscription();
          then:
            - media_player.repeat_off: wifi_audio_player
            - media_player.stop: wifi_audio_player
            - globals.set:
                id: local_audio_active
                value: "false"

sensor:
  - platform: uptime
    name: Uptime
  - platform: wifi_signal
    name: Wi-Fi signal
    update_interval: 60s
  - platform: debug
    free:
      name: Heap free
    block:
      name: Heap largest block
    fragmentation:
      name: Heap fragmentation
    min_free:
      name: Heap minimum free
    loop_time:
      name: Loop time
  - platform: modbus_controller
    modbus_controller_id: bridge_controller
    id: audio_bridge_heartbeat
    name: Audio bridge heartbeat
    register_type: holding
    address: 0
    value_type: U_WORD
    accuracy_decimals: 0
    on_value:
      - lambda: |-
          static uint8_t logged = 0;
          if (logged < 3) {
            ESP_LOGI("bridge", "Audio bridge heartbeat=%.0f", x);
            logged++;
          }
      - if:
          condition:
            binary_sensor.is_off: audio_bridge_online
          then:
            - logger.log: "Audio bridge heartbeat received"
            - binary_sensor.template.publish:
                id: audio_bridge_online
                state: true
  - platform: modbus_controller
    modbus_controller_id: bridge_controller
    id: audio_bridge_play_request
    internal: true
    register_type: holding
    address: 2
    value_type: U_WORD
    accuracy_decimals: 0
    on_value:
      - if:
          condition:
            lambda: |-
              static bool initialized = false;
              static uint16_t previous = 0;
              const uint16_t current = static_cast<uint16_t>(x);
              const bool pressed = initialized && current != previous;
              previous = current;
              initialized = true;
              return pressed &&
                     !api::global_api_server->is_connected_with_state_subscription();
          then:
            - if:
                condition:
                  media_player.is_playing: wifi_audio_player
                then:
                  - media_player.pause: wifi_audio_player
                else:
                  - if:
                      condition:
                        media_player.is_paused: wifi_audio_player
                      then:
                        - media_player.play: wifi_audio_player
                      else:
                        - media_player.repeat_one: wifi_audio_player
                        - lambda: |-
                            auto *file = id(pcm_bridge).get_local_audio_file();
                            if (file != nullptr)
                              id(wifi_audio_player).play_file(file, false, false);
                        - globals.set:
                            id: local_audio_active
                            value: "true"
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: STM32 battery voltage
    register_type: read
    address: 0x0010
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: STM32 battery current
    register_type: read
    address: 0x0011
    value_type: S_WORD
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - lambda: |-
          return x > 32767.0f ? x - 65536.0f : x;
      - multiply: 0.001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: STM32 dock voltage
    register_type: read
    address: 0x0012
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

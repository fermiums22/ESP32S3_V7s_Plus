binary_sensor:
  - platform: template
    id: audio_bridge_online
    name: Audio bridge online
    device_class: connectivity
  - platform: template
    id: stm32_online
    name: STM32 online
    device_class: connectivity
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Robot enabled status
    register_type: read
    address: 0x0004
    bitmask: 0x0001
    icon: mdi:robot-vacuum
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: STM32 emergency stop
    register_type: read
    address: 0x0004
    bitmask: 0x0002
    device_class: safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Bumper hit
    register_type: read
    address: 0x0004
    bitmask: 0x0004
    device_class: safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left motor fault
    register_type: read
    address: 0x0004
    bitmask: 0x0008
    device_class: problem
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right motor fault
    register_type: read
    address: 0x0004
    bitmask: 0x0010
    device_class: problem
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Robot power button
    register_type: read
    address: 0x0039
    bitmask: 0x0002
    device_class: power
    icon: mdi:gesture-tap-button
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left bumper pressed
    register_type: read
    address: 0x003C
    bitmask: 0x0001
    device_class: safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right bumper pressed
    register_type: read
    address: 0x003C
    bitmask: 0x0002
    device_class: safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left bumper latched
    register_type: read
    address: 0x003C
    bitmask: 0x0100
    device_class: problem
    entity_category: diagnostic
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right bumper latched
    register_type: read
    address: 0x003C
    bitmask: 0x0200
    device_class: problem
    entity_category: diagnostic
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Docking active
    register_type: read
    address: 0x0004
    bitmask: 0x0040
    icon: mdi:home-import-outline
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Robot docked
    register_type: read
    address: 0x0004
    bitmask: 0x0080
    device_class: battery_charging

number:
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left wheel target
    register_type: holding
    address: 0x0100
    value_type: S_WORD
    min_value: -150
    max_value: 150
    step: 1
    multiply: 10
    unit_of_measurement: rpm
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right wheel target
    register_type: holding
    address: 0x0101
    value_type: S_WORD
    min_value: -150
    max_value: 150
    step: 1
    multiply: 10
    unit_of_measurement: rpm
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Button yellow LED brightness
    register_type: holding
    address: 0x0102
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
    multiply: 10
    unit_of_measurement: "%"
    icon: mdi:brightness-percent
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Button orange LED brightness
    register_type: holding
    address: 0x0103
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
    multiply: 10
    unit_of_measurement: "%"
    icon: mdi:brightness-percent
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Base IR capture channel
    register_type: holding
    address: 0x0104
    value_type: U_WORD
    min_value: 0
    max_value: 4
    step: 1
    icon: mdi:tune-variant
    entity_category: diagnostic

switch:
  - platform: modbus_controller
    modbus_controller_id: bridge_controller
    id: audio_bridge_ota_command
    internal: true
    register_type: holding
    address: 1
    bitmask: 0x0001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_motor_enable
    name: Robot enabled
    register_type: coil
    address: 0
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Emergency stop
    register_type: coil
    address: 1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_clear_safety
    name: Clear safety latch
    register_type: coil
    address: 2
    assumed_state: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: stm32_clear_safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: IR illumination
    register_type: coil
    address: 3
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_charge_control_enable
    name: Manual charge override
    register_type: coil
    address: 7
    restore_mode: ALWAYS_OFF
    icon: mdi:battery-charging-outline
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_auto_charge_enable
    name: Auto charge on dock
    register_type: coil
    address: 8
    restore_mode: ALWAYS_ON
    icon: mdi:battery-sync-outline
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: dock_robot
    name: Dock robot
    register_type: coil
    address: 4
    icon: mdi:home-import-outline
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: base_ir_capture_command
    internal: true
    register_type: coil
    address: 5
    assumed_state: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: base_ir_capture_command

text_sensor:
  - platform: template
    id: docking_state
    name: Docking state
    icon: mdi:robot-vacuum
  - platform: template
    id: base_ir_direction
    name: Base IR direction
    icon: mdi:compass-outline
  - platform: wifi_info
    ip_address:
      name: IP address
  - platform: version
    name: ESPHome version
  - platform: debug
    reset_reason:
      name: Reset reason

button:
  - platform: restart
    name: Restart
  - platform: template
    name: Capture base IR waveform
    icon: mdi:waveform
    entity_category: diagnostic
    on_press:
      - switch.turn_on: base_ir_capture_command
  - platform: template
    name: Open audio bridge OTA window
    icon: mdi:update
    on_press:
      - script.execute: open_audio_bridge_ota_window
  - platform: template
    name: Close audio bridge OTA window
    icon: mdi:close-network-outline
    on_press:
      - script.stop: open_audio_bridge_ota_window
      - globals.set:
          id: audio_bridge_ota_request_pending
          value: "false"
      - component.resume: bridge_controller
      - switch.turn_off: audio_bridge_ota_command
      - logger.log: "Audio bridge OTA window closed manually; Modbus polling resumed"
  - platform: template
    name: Play local Balensiaga
    on_press:
      - media_player.repeat_one: wifi_audio_player
      - lambda: |-
          auto *file = id(pcm_bridge).get_local_audio_file();
          if (file != nullptr)
            id(wifi_audio_player).play_file(file, false, false);
      - globals.set:
          id: local_audio_active
          value: "false"

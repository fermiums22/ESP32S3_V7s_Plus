    name: Right wheel speed
    register_type: read
    address: 0x0069
    value_type: S_WORD
    unit_of_measurement: rpm
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left wheel position
    register_type: read
    address: 0x0062
    value_type: S_DWORD
    unit_of_measurement: edges
    state_class: measurement
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right wheel position
    register_type: read
    address: 0x006A
    value_type: S_DWORD
    unit_of_measurement: edges
    state_class: measurement
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Caster odometry
    register_type: read
    address: 0x0070
    value_type: U_DWORD
    unit_of_measurement: edges
    state_class: total_increasing

binary_sensor:
  - platform: template
    id: audio_bridge_online
    name: Audio bridge online
    device_class: connectivity
  - platform: template
    id: stm32_online
    name: STM32 online
    device_class: connectivity
  - platform: modbus_controller
    modbus_controller_id: bridge_controller
    id: jbl_connected_modbus
    name: JBL Go 3 connected
    register_type: holding
    address: 4
    bitmask: 0x0001
    device_class: connectivity
  - platform: modbus_controller
    modbus_controller_id: bridge_controller
    name: JBL audio stream active
    register_type: holding
    address: 4
    bitmask: 0x0002
    icon: mdi:speaker-wireless
  - platform: modbus_controller
    modbus_controller_id: bridge_controller
    name: JBL PCM audio present
    register_type: holding
    address: 4
    bitmask: 0x0004
    icon: mdi:waveform
  - platform: modbus_controller

            const uint16_t state = static_cast<uint16_t>(x);
            switch (state) {
              case 0: return "Ожидание";
              case 1: return "Поиск базы";
              case 2: return "Поворот влево";
              case 3: return "Поворот вправо";
              case 4: return "Подъезд к базе";
              case 5: return "На базе";
              case 6: return "Остановлен";
              case 7: return "Ошибка: таймаут";
              case 8: return "Ошибка: бампер";
              case 9: return "Ошибка двигателя";
              default: return "Неизвестно";

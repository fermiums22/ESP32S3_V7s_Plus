  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Base IR rear activity
    register_type: read
    address: 0x0034
    value_type: U_WORD
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:signal
    filters:
      - multiply: 0.1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: base_ir_direction_code
    internal: true
    register_type: read
    address: 0x0035
    value_type: U_WORD
    on_value:
      - text_sensor.template.publish:
          id: base_ir_direction
          state: !lambda |-
            const uint16_t direction = static_cast<uint16_t>(x);
            switch (direction) {
              case 0: return "Спереди слева";
              case 1: return "Спереди справа";
              case 2: return "Слева";
              case 3: return "Справа";
              case 4: return "Сзади";
              default: return "Нет сигнала";
            }
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Base IR seen mask
    register_type: read
    address: 0x0036
    value_type: U_WORD
    accuracy_decimals: 0

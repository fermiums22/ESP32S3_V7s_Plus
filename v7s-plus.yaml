  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Charge PWM duty
    register_type: read
    address: 0x00B3
    value_type: U_WORD
    unit_of_measurement: "‰"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:sine-wave
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Charge battery voltage
    register_type: read
    address: 0x00B4
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Charge battery current
    register_type: read
    address: 0x00B5
    value_type: S_WORD
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Charge input voltage
    register_type: read
    address: 0x00B6
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Charge control sequence
    register_type: read
    address: 0x00B7
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic
    icon: mdi:counter
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Auto charge on dock status
    register_type: read
    address: 0x00B8
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic
    icon: mdi:battery-sync-outline
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Front IR left
    register_type: read
    address: 0x0020
    value_type: S_WORD
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Front IR center
    register_type: read
    address: 0x0021
    value_type: S_WORD
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Front IR right
    register_type: read
    address: 0x0022
    value_type: S_WORD
    icon: mdi:radar
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Front IR left rate
    register_type: read
    address: 0x0023
    value_type: S_WORD
    entity_category: diagnostic
    icon: mdi:trending-up
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Front IR center rate
    register_type: read
    address: 0x0024
    value_type: S_WORD
    entity_category: diagnostic

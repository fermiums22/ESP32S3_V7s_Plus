      - text_sensor.template.publish:
          id: base_ir_direction
          state: !lambda |-
            const uint16_t direction = static_cast<uint16_t>(x);
            switch (direction) {
              case 0: return "Спереди слева";
              case 1: return "Спереди справа";
              case 2: return "Слева";
              case 3: return "Справа";
              case 4: return "Сзади";
              default: return "Нет сигнала";
            }
  - platform: modbus_controller

button:
  - platform: restart
    name: Restart
  - platform: template
    name: Open audio bridge OTA window
    icon: mdi:update
    on_press:
      - script.execute: open_audio_bridge_ota_window
  - platform: template
    name: Close audio bridge OTA window
    icon: mdi:close-network-outline
    on_press:
      - script.stop: open_audio_bridge_ota_window
      - component.resume: bridge_controller
      - switch.turn_off: audio_bridge_ota_command
      - logger.log: "Audio bridge OTA window closed manually; Modbus polling resumed"
  - platform: template
    name: GoPro connect home 5 GHz
    icon: mdi:wifi
    on_press:
      - number.set:
          id: gopro_command_register
          value: 5
  - platform: template
    name: GoPro refresh state
    icon: mdi:refresh
    on_press:
      - number.set:
          id: gopro_command_register
          value: 6
  - platform: template
    name: Play local Balensiaga
    on_press:
      - media_player.repeat_one: wifi_audio_player
      - lambda: |-
          auto *file = id(pcm_bridge).get_local_audio_file();
          if (file != nullptr)
            id(wifi_audio_player).play_file(file, false, false);
      - globals.set:
          id: local_audio_active
          value: "false"

select:
  - platform: template
    name: Robot button color
    id: robot_button_color
    icon: mdi:palette
    optimistic: true
    restore_value: false
    options:
      - "Off"
      - "Yellow"
      - "Orange"
      - "Amber"
    set_action:
      - lambda: |-
          float yellow = 0.0f;
          float orange = 0.0f;
          if (x == "Yellow") yellow = 60.0f;
          else if (x == "Orange") orange = 60.0f;
          else if (x == "Amber") {
            yellow = 45.0f;
            orange = 45.0f;
          }
          auto yellow_call = id(button_yellow_brightness).make_call();
          yellow_call.set_value(yellow);
          yellow_call.perform();
          auto orange_call = id(button_orange_brightness).make_call();
          orange_call.set_value(orange);
          orange_call.perform();

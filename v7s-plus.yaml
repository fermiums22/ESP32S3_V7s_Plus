esphome:
  name: v7s-plus
  friendly_name: V7s Plus
  min_version: 2026.6.5

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  toolchain: esp-idf
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

sensor:
  - platform: uptime
    name: Uptime
  - platform: wifi_signal
    name: Wi-Fi signal
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP address
  - platform: version
    name: ESPHome version

button:
  - platform: restart
    name: Restart

esphome:
  name: v7s-plus
  friendly_name: V7s Plus
  min_version: 2026.6.5

external_components:
  - source:
      type: local
      path: components

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  toolchain: esp-idf
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG

uart:
  id: stm32_uart
  tx_pin: GPIO42
  rx_pin: GPIO41
  baud_rate: 921600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 512

modbus:
  id: stm32_modbus
  uart_id: stm32_uart
  role: client
  send_wait_time: 2ms

modbus_controller:
  - id: stm32_controller
    address: 1
    modbus_id: stm32_modbus
    command_throttle: 2ms
    update_interval: 200ms
    max_cmd_retries: 2
    offline_skip_updates: 5

v7s_stm32_flasher:
  id: stm32_flasher
  uart_id: stm32_uart
  modbus_controller_id: stm32_controller
  boot_pin: GPIO1
  reset_pin:
    number: GPIO2
    mode:
      output: true
      open_drain: true
  firmware: ../V7s_Plus/Debug/V7s_Plus.bin
  flash_button:
    name: Flash STM32 firmware
  progress:
    name: STM32 flash progress
  status:
    name: STM32 flash status

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

sensor:
  - platform: uptime
    name: Uptime
  - platform: wifi_signal
    name: Wi-Fi signal
    update_interval: 60s
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: STM32 battery voltage
    register_type: read
    address: 0x0010
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: STM32 battery current
    register_type: read
    address: 0x0011
    value_type: U_WORD
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: STM32 dock voltage
    register_type: read
    address: 0x0012
    value_type: U_WORD
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Front IR left
    register_type: read
    address: 0x0020
    value_type: S_WORD
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Front IR center
    register_type: read
    address: 0x0021
    value_type: S_WORD
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Front IR right
    register_type: read
    address: 0x0022
    value_type: S_WORD
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left wheel speed
    register_type: read
    address: 0x0061
    value_type: S_WORD
    unit_of_measurement: rpm
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right wheel speed
    register_type: read
    address: 0x0069
    value_type: S_WORD
    unit_of_measurement: rpm
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left wheel position
    register_type: read
    address: 0x0062
    value_type: S_DWORD
    unit_of_measurement: edges
    state_class: measurement
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right wheel position
    register_type: read
    address: 0x006A
    value_type: S_DWORD
    unit_of_measurement: edges
    state_class: measurement
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Caster odometry
    register_type: read
    address: 0x0070
    value_type: U_DWORD
    unit_of_measurement: edges
    state_class: total_increasing

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: STM32 emergency stop
    register_type: read
    address: 0x0004
    bitmask: 0x0002
    device_class: safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Bumper hit
    register_type: read
    address: 0x0004
    bitmask: 0x0004
    device_class: safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left motor fault
    register_type: read
    address: 0x0004
    bitmask: 0x0008
    device_class: problem
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right motor fault
    register_type: read
    address: 0x0004
    bitmask: 0x0010
    device_class: problem

number:
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left wheel target
    register_type: holding
    address: 0x0100
    value_type: S_WORD
    min_value: -150
    max_value: 150
    step: 1
    multiply: 10
    unit_of_measurement: rpm
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right wheel target
    register_type: holding
    address: 0x0101
    value_type: S_WORD
    min_value: -150
    max_value: 150
    step: 1
    multiply: 10
    unit_of_measurement: rpm

switch:
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_motor_enable
    name: Motor enable
    register_type: coil
    address: 0
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Emergency stop
    register_type: coil
    address: 1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_clear_safety
    name: Clear safety latch
    register_type: coil
    address: 2
    assumed_state: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: stm32_clear_safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: IR illumination
    register_type: coil
    address: 3

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP address
  - platform: version
    name: ESPHome version

button:
  - platform: restart
    name: Restart

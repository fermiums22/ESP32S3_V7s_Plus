    icon: mdi:stairs-down
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Cliff front right
    register_type: read
    address: 0x0041
    value_type: S_WORD
    icon: mdi:stairs-down
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Cliff right
    register_type: read
    address: 0x0042
    value_type: S_WORD
    icon: mdi:stairs-down
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Cliff left
    register_type: read
    address: 0x0043
    value_type: S_WORD
    icon: mdi:stairs-down
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Side proximity
    register_type: read
    address: 0x0044
    value_type: S_WORD
    icon: mdi:radar
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Cliff front left rate
    register_type: read
    address: 0x0048
    value_type: S_WORD
    entity_category: diagnostic
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Cliff front right rate
    register_type: read
    address: 0x0049
    value_type: S_WORD
    entity_category: diagnostic
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Cliff right rate
    register_type: read
    address: 0x004A
    value_type: S_WORD
    entity_category: diagnostic
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Cliff left rate
    register_type: read
    address: 0x004B
    value_type: S_WORD
    entity_category: diagnostic
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Side proximity rate
    register_type: read
    address: 0x004C
    value_type: S_WORD
    entity_category: diagnostic
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Base IR front left activity
    register_type: read
    address: 0x0030
    value_type: U_WORD
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:signal
    filters:
      - multiply: 0.1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Base IR front right activity
    register_type: read
    address: 0x0031
    value_type: U_WORD
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:signal
    filters:
      - multiply: 0.1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Base IR left activity
    register_type: read
    address: 0x0032
    value_type: U_WORD
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:signal
    filters:
      - multiply: 0.1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Base IR right activity
    register_type: read
    address: 0x0033
    value_type: U_WORD
    unit_of_measurement: "%"
    state_class: measurement

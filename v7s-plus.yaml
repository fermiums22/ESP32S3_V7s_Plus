number:
  - platform: modbus_controller
    modbus_controller_id: bridge_controller
    id: gopro_command_register
    internal: true
    register_type: holding
    address: 10
    value_type: U_WORD
    min_value: 0
    max_value: 8
    step: 1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Left wheel target
    register_type: holding
    address: 0x0100
    value_type: S_WORD
    min_value: -150
    max_value: 150
    step: 1
    multiply: 10
    unit_of_measurement: rpm
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Right wheel target
    register_type: holding
    address: 0x0101
    value_type: S_WORD
    min_value: -150
    max_value: 150
    step: 1
    multiply: 10
    unit_of_measurement: rpm
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: button_yellow_brightness
    name: Button yellow LED brightness
    register_type: holding
    address: 0x0102
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
    multiply: 10
    unit_of_measurement: "%"
    icon: mdi:brightness-percent
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: button_orange_brightness
    name: Button orange LED brightness
    register_type: holding
    address: 0x0103
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
    multiply: 10
    unit_of_measurement: "%"
    icon: mdi:brightness-percent
switch:
  - platform: template
    id: gopro_power_control
    name: GoPro power
    icon: mdi:camera
    lambda: return id(gopro_ble_connected_modbus).state;
    turn_on_action:
      - number.set:
          id: gopro_command_register
          value: 1
    turn_off_action:
      - number.set:
          id: gopro_command_register
          value: 2
  - platform: template
    id: gopro_stream_control
    name: GoPro stream
    icon: mdi:broadcast
    lambda: return id(gopro_streaming_modbus).state;
    turn_on_action:
      - number.set:
          id: gopro_command_register
          value: 3
    turn_off_action:
      - number.set:
          id: gopro_command_register
          value: 4
  - platform: modbus_controller
    modbus_controller_id: bridge_controller
    id: audio_bridge_ota_command
    internal: true
    register_type: holding
    address: 1
    bitmask: 0x0001
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_motor_enable
    name: Robot run
    register_type: coil
    address: 0
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: Emergency stop
    register_type: coil
    address: 1
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_clear_safety
    name: Clear safety latch
    register_type: coil
    address: 2
    assumed_state: true
    on_turn_on:
      - delay: 100ms
      - switch.turn_off: stm32_clear_safety
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    name: IR illumination
    register_type: coil
    address: 3
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_charge_control_enable
    name: Manual charge override
    register_type: coil
    address: 7
    restore_mode: ALWAYS_OFF
    icon: mdi:battery-charging-outline
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: stm32_auto_charge_enable
    name: Auto charge on dock
    register_type: coil
    address: 8
    restore_mode: ALWAYS_ON
    icon: mdi:battery-sync-outline
  - platform: modbus_controller
    modbus_controller_id: stm32_controller
    id: dock_robot
    name: Dock robot
    register_type: coil
    address: 4
    icon: mdi:home-import-outline
